<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Grail — EV Charging</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #0f0f0f;
      color: #fff;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 16px;
    }
    .card {
      background: #1a1a1a;
      border: 1px solid #2a2a2a;
      border-radius: 16px;
      max-width: 400px;
      width: 100%;
      overflow: hidden;
    }
    .card-icon {
      width: 100%;
      height: 160px;
      object-fit: cover;
      background: #111;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .card-icon img { width: 100%; height: 100%; object-fit: cover; }
    .card-body { padding: 20px; }
    .card-title { font-size: 18px; font-weight: 700; margin-bottom: 6px; }
    .card-desc { font-size: 13px; color: #aaa; margin-bottom: 16px; line-height: 1.5; }
    .btn-group { display: flex; flex-direction: column; gap: 8px; }
    .btn-row { display: flex; gap: 8px; }
    .btn {
      background: #9945FF;
      color: #fff;
      border: none;
      border-radius: 10px;
      padding: 12px 14px;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      transition: opacity 0.15s;
      flex: 1;
    }
    .btn:hover { opacity: 0.85; }
    .btn:disabled { opacity: 0.4; cursor: not-allowed; }
    .btn.stop {
      background: #c0392b;
      margin-top: 12px;
      width: 100%;
      font-size: 15px;
      padding: 14px;
      flex: unset;
    }
    .btn.stop:hover { opacity: 0.85; }
    .session-box {
      margin-top: 16px;
      padding: 12px;
      background: #111;
      border-radius: 8px;
      border: 1px solid #2a2a2a;
      font-size: 13px;
      display: none;
    }
    .session-box.visible { display: block; }
    .session-row { display: flex; justify-content: space-between; margin-bottom: 6px; }
    .session-row:last-child { margin-bottom: 0; }
    .session-label { color: #888; }
    .session-value { font-weight: 600; }
    .session-value.charging { color: #6fcf6f; }
    .session-value.settling { color: #f7c96f; }
    .session-value.settled { color: #6fcf6f; }
    .session-value.failed { color: #f76f6f; }
    .status {
      margin-top: 12px;
      padding: 12px;
      border-radius: 8px;
      font-size: 13px;
      display: none;
    }
    .status.info { background: #1e2a3a; color: #7eb8f7; display: block; }
    .status.success { background: #1a2e1a; color: #6fcf6f; display: block; }
    .status.error { background: #2e1a1a; color: #f76f6f; display: block; }
    .status a { color: inherit; word-break: break-all; }
    .wallet-bar {
      padding: 12px 20px;
      background: #111;
      border-bottom: 1px solid #2a2a2a;
      display: flex;
      align-items: center;
      justify-content: space-between;
      font-size: 13px;
    }
    .dot { width: 8px; height: 8px; border-radius: 50%; background: #ccc; display: inline-block; margin-right: 6px; }
    .dot.connected { background: #6fcf6f; }
    #connect-btn {
      background: #2a2a2a;
      color: #fff;
      border: 1px solid #3a3a3a;
      border-radius: 6px;
      padding: 6px 12px;
      font-size: 12px;
      cursor: pointer;
    }
    .divider { border: none; border-top: 1px solid #2a2a2a; margin: 14px 0; }
  </style>
</head>
<body>
<div class="card">
  <div class="wallet-bar">
    <span><span class="dot" id="wallet-dot"></span><span id="wallet-label">Not connected</span></span>
    <button id="connect-btn" onclick="connectWallet()">Connect Wallet</button>
  </div>
  <div class="card-icon">
    <img src="https://upload.wikimedia.org/wikipedia/commons/thumb/8/82/Solana_logo.png/240px-Solana_logo.png" alt="Solana" />
  </div>
  <div class="card-body">
    <div class="card-title" id="card-title">Loading…</div>
    <div class="card-desc" id="card-desc"></div>

    <!-- Charge amount buttons — hidden during/after session -->
    <div id="charge-section">
      <div class="btn-group" id="btn-group"></div>
    </div>

    <!-- Session status — shown after confirm -->
    <div class="session-box" id="session-box">
      <div class="session-row">
        <span class="session-label">Status</span>
        <span class="session-value" id="sess-status">—</span>
      </div>
      <div class="session-row">
        <span class="session-label">Energy used</span>
        <span class="session-value" id="sess-energy">—</span>
      </div>
      <div class="session-row">
        <span class="session-label">USDC locked</span>
        <span class="session-value" id="sess-locked">—</span>
      </div>
      <div class="session-row" id="sess-cost-row" style="display:none">
        <span class="session-label">Final cost</span>
        <span class="session-value" id="sess-cost">—</span>
      </div>
      <div class="session-row" id="sess-refund-row" style="display:none">
        <span class="session-label">Refund</span>
        <span class="session-value" id="sess-refund">—</span>
      </div>
      <div class="session-row" id="sess-sig-row" style="display:none">
        <span class="session-label">Settlement tx</span>
        <span class="session-value"><a id="sess-sig-link" href="#" target="_blank" style="color:#9945FF;">View →</a></span>
      </div>
      <button class="btn stop" id="stop-btn" onclick="stopSession()" style="display:none">
        ⏹ Stop Charging
      </button>
    </div>

    <div class="status" id="status"></div>
  </div>
</div>

<script src="https://unpkg.com/@solana/web3.js@1.95.3/lib/index.iife.min.js"></script>
<script>
  const params   = new URLSearchParams(location.search);
  const tenant   = params.get('tenant') || 'demo-cpo';
  const station  = params.get('station') || 'ioc1';
  const connector = params.get('connector') || '1';
  const actionBase = `${location.origin}/v1/charge/${tenant}/${station}/${connector}`;

  let walletPubkey = null;
  let activeSessionId = localStorage.getItem(`grail_session_${station}`) || null;
  let pollTimer = null;

  function setStatus(msg, type) {
    const el = document.getElementById('status');
    el.className = 'status ' + type;
    el.innerHTML = msg;
  }

  async function connectWallet() {
    const provider = window.solana || window.backpack;
    if (!provider) {
      setStatus('No wallet found. Open this page inside Phantom or Backpack browser.', 'error');
      return;
    }
    try {
      const resp = await provider.connect();
      walletPubkey = resp.publicKey.toString();
      document.getElementById('wallet-dot').className = 'dot connected';
      document.getElementById('wallet-label').textContent = walletPubkey.slice(0,4) + '…' + walletPubkey.slice(-4);
      document.getElementById('connect-btn').textContent = 'Connected';
      document.getElementById('connect-btn').disabled = true;
      document.querySelectorAll('.action-btn').forEach(b => b.disabled = false);
      setStatus('Wallet connected. Choose an amount to start charging.', 'info');
    } catch (e) {
      setStatus('Connection rejected: ' + e.message, 'error');
    }
  }

  async function charge(amount) {
    if (!walletPubkey) { setStatus('Connect your wallet first.', 'error'); return; }
    const provider = window.solana || window.backpack;
    setStatus('Building transaction…', 'info');
    document.querySelectorAll('.action-btn').forEach(b => b.disabled = true);
    try {
      const res = await fetch(`${actionBase}?amount=${amount}`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ account: walletPubkey }),
      });
      if (!res.ok) throw new Error('Blink API error: ' + res.status);
      const { transaction, message } = await res.json();

      setStatus('Please approve in your wallet…', 'info');

      const txBytes = Uint8Array.from(atob(transaction), c => c.charCodeAt(0));
      const tx = solanaWeb3.VersionedTransaction.deserialize(txBytes);
      const { signature } = await provider.signAndSendTransaction(tx);

      setStatus('Transaction confirmed. Starting charge session…', 'info');

      const confirmRes = await fetch(`${location.origin}/v1/charge/confirm`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          signature,
          userPublicKey: walletPubkey,
          tenantId: tenant,
          stationId: station,
          connectorId: Number(connector),
          usdcAmount: Number(amount),
        }),
      });
      const confirmData = await confirmRes.json();
      activeSessionId = confirmData.sessionId;
      localStorage.setItem(`grail_session_${station}`, activeSessionId);

      setStatus(
        `✅ ${message} — session started<br>` +
        `<a href="https://explorer.solana.com/tx/${signature}?cluster=devnet" target="_blank">Lock tx →</a>`,
        'success'
      );

      // Hide charge buttons, show session panel
      document.getElementById('charge-section').style.display = 'none';
      document.getElementById('session-box').classList.add('visible');
      document.getElementById('stop-btn').style.display = 'block';
      startPolling();
    } catch (e) {
      setStatus('❌ ' + (e.message || e), 'error');
      document.querySelectorAll('.action-btn').forEach(b => b.disabled = false);
    }
  }

  async function stopSession() {
    if (!activeSessionId) return;
    document.getElementById('stop-btn').disabled = true;
    setStatus('Sending stop signal to charger…', 'info');
    try {
      const res = await fetch(`${location.origin}/v1/charge/stop`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ sessionId: activeSessionId }),
      });
      if (!res.ok) {
        const err = await res.json().catch(() => ({ message: res.statusText }));
        throw new Error(err.message || JSON.stringify(err));
      }
      setStatus('Stop sent. Waiting for charger to confirm…', 'info');
    } catch (e) {
      setStatus('Stop failed: ' + e.message, 'error');
      document.getElementById('stop-btn').disabled = false;
    }
  }

  function startPolling() {
    if (pollTimer) clearInterval(pollTimer);
    pollTimer = setInterval(pollSession, 4000);
    pollSession();
  }

  async function pollSession() {
    if (!activeSessionId) return;
    try {
      const res = await fetch(`${location.origin}/v1/charge/session/${activeSessionId}`);
      const s = await res.json();
      updateSessionBox(s);
      if (s.status === 'SETTLED' || s.status === 'FAILED') {
        clearInterval(pollTimer);
        document.getElementById('stop-btn').style.display = 'none';
        localStorage.removeItem(`grail_session_${station}`);
      }
    } catch (_) {}
  }

  function updateSessionBox(s) {
    const statusEl = document.getElementById('sess-status');
    statusEl.textContent = s.status || '—';
    statusEl.className = 'session-value ' + (s.status || '').toLowerCase();

    let kwh = '—';
    if (s.energyDeliveredKwh != null) {
      kwh = s.energyDeliveredKwh.toFixed(4) + ' kWh';
    } else if (s.liveEnergyKwh != null && s.meterStartWh != null) {
      const consumed = Math.max(0, s.liveEnergyKwh - s.meterStartWh / 1000);
      kwh = consumed.toFixed(4) + ' kWh (live)';
    } else if (['CHARGING','OCPP_STARTING','ENDING'].includes(s.status)) {
      kwh = 'waiting for meter…';
    }
    document.getElementById('sess-energy').textContent = kwh;
    document.getElementById('sess-locked').textContent = s.usdcLocked != null ? s.usdcLocked + ' USDC' : '—';

    if (s.finalCostUsdc != null) {
      document.getElementById('sess-cost').textContent = s.finalCostUsdc + ' USDC';
      document.getElementById('sess-cost-row').style.display = 'flex';
    }
    if (s.refundUsdc != null && s.refundUsdc > 0) {
      document.getElementById('sess-refund').textContent = s.refundUsdc + ' USDC';
      document.getElementById('sess-refund-row').style.display = 'flex';
    }
    if (s.settlementSignature) {
      document.getElementById('sess-sig-link').href =
        `https://explorer.solana.com/tx/${s.settlementSignature}?cluster=devnet`;
      document.getElementById('sess-sig-row').style.display = 'flex';
    }

    // Show stop button only while active
    const active = ['OCPP_STARTING','CHARGING','ENDING'].includes(s.status);
    document.getElementById('stop-btn').style.display = active ? 'block' : 'none';
  }

  async function loadAction() {
    try {
      const res = await fetch(actionBase);
      const action = await res.json();
      document.getElementById('card-title').textContent = action.title;
      document.getElementById('card-desc').textContent = action.description;
      const group = document.getElementById('btn-group');
      group.innerHTML = '';

      // Render buttons in two rows: small amounts | larger amounts
      const row1 = document.createElement('div');
      row1.className = 'btn-row';
      const row2 = document.createElement('div');
      row2.className = 'btn-row';

      action.links.actions.forEach((a, i) => {
        const amount = new URL(a.href).searchParams.get('amount');
        const btn = document.createElement('button');
        btn.className = 'btn action-btn';
        btn.textContent = a.label;
        btn.disabled = true;
        btn.onclick = () => charge(amount);
        (i < 3 ? row1 : row2).appendChild(btn);
      });

      if (row1.children.length) group.appendChild(row1);
      if (row2.children.length) group.appendChild(row2);
    } catch (e) {
      document.getElementById('card-title').textContent = 'Failed to load action';
      setStatus('Could not reach Blink API: ' + e.message, 'error');
    }
  }

  window.addEventListener('load', async () => {
    loadAction();
    const provider = window.solana || window.backpack;
    if (provider?.isConnected) {
      await connectWallet();
    }
    // Restore active session if one was in progress
    if (activeSessionId) {
      const res = await fetch(`${location.origin}/v1/charge/session/${activeSessionId}`).catch(() => null);
      if (res?.ok) {
        const s = await res.json();
        if (s && !s.error && ['OCPP_STARTING','CHARGING','ENDING'].includes(s.status)) {
          document.getElementById('charge-section').style.display = 'none';
          document.getElementById('session-box').classList.add('visible');
          document.getElementById('stop-btn').style.display = 'block';
          setStatus('Session in progress — reconnected.', 'info');
          updateSessionBox(s);
          startPolling();
        } else {
          // Session is settled/failed — clear storage
          localStorage.removeItem(`grail_session_${station}`);
          activeSessionId = null;
        }
      }
    }
  });
</script>
</body>
</html>
